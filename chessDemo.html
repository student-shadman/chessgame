<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Chess - Portfolio Project</title>
    <meta name="description" content="Experience chess in stunning 3D with AI opponent, smooth animations, and premium design">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #1A237E;
            --primary-light: #3949AB;
            --accent-gold: #FFD700;
            --accent-cyan: #00E5FF;
            --wood-dark: #3E2723;
            --wood-light: #F5E6D3;
            --bg-gradient: linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #particles-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            background: rgba(26, 35, 126, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .header-controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            border: 2px solid var(--accent-gold);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.4);
            border-color: var(--accent-cyan);
        }

        .btn:active {
            transform: translateY(0);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        .side-panel {
            background: rgba(26, 35, 126, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
        }

        .game-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .timer {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .timer-label {
            font-size: 0.9rem;
            color: var(--accent-cyan);
            margin-bottom: 5px;
        }

        .timer-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-gold);
        }

        .captured-pieces {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            min-height: 100px;
        }

        .piece-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .captured-piece {
            font-size: 1.5rem;
            opacity: 0.7;
        }

        .move-history {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .move-entry {
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }

        .move-entry:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        #game-canvas-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            border: 2px solid var(--accent-gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #game-canvas:active {
            cursor: grabbing;
        }

        .game-status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 35, 126, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid var(--accent-gold);
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 10;
            display: none;
        }

        .game-status.show {
            display: block;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-gold); }
            50% { box-shadow: 0 0 40px var(--accent-gold); }
        }

        .settings-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .setting-group {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
        }

        .setting-label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent-cyan);
            font-size: 0.9rem;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 8px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent-gold);
            border-radius: 5px;
            color: white;
            font-size: 1rem;
        }

        input[type="range"] {
            cursor: pointer;
        }

        .theme-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .theme-option {
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .theme-option:hover {
            transform: scale(1.1);
            border-color: var(--accent-cyan);
        }

        .theme-option.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px var(--accent-gold);
        }

        .theme-wooden { background: linear-gradient(135deg, #3E2723, #F5E6D3); }
        .theme-marble { background: linear-gradient(135deg, #2C3E50, #ECF0F1); }
        .theme-neon { background: linear-gradient(135deg, #1A237E, #00E5FF); }

        .ai-indicator {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-top: 10px;
        }

        .ai-thinking {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .ai-thinking.active {
            display: flex;
        }

        .thinking-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: thinkingPulse 1.4s ease-in-out infinite;
        }

        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes thinkingPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        /* Responsive Design */
        @media (max-width: 1400px) {
            main {
                grid-template-columns: 250px 1fr 250px;
            }
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .side-panel {
                display: none;
            }

            header {
                padding: 15px 20px;
            }

            header h1 {
                font-size: 1.5rem;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-text">Loading Premium Chess...</div>
        <div class="loading-spinner"></div>
    </div>

    <!-- Particle Background -->
    <canvas id="particles-bg"></canvas>

    <!-- Main Container -->
    <div class="container">
        <header>
            <h1>♔ Premium 3D Chess</h1>
            <div class="header-controls">
                <button class="btn" onclick="newGame()">New Game</button>
                <button class="btn" onclick="undoMove()">Undo</button>
                <button class="btn" onclick="toggleSound()">🔊 Sound</button>
            </div>
        </header>

        <main>
            <!-- Left Panel: Game Info -->
            <aside class="side-panel">
                <h2 class="panel-title">Game Info</h2>
                <div class="game-info">
                    <div class="timer">
                        <div class="timer-label">White</div>
                        <div class="timer-value" id="white-timer">10:00</div>
                    </div>
                    <div class="timer">
                        <div class="timer-label">Black</div>
                        <div class="timer-value" id="black-timer">10:00</div>
                    </div>
                    <div class="captured-pieces">
                        <div style="font-size: 0.9rem; color: var(--accent-cyan);">Captured by White</div>
                        <div class="piece-list" id="white-captured"></div>
                    </div>
                    <div class="captured-pieces">
                        <div style="font-size: 0.9rem; color: var(--accent-cyan);">Captured by Black</div>
                        <div class="piece-list" id="black-captured"></div>
                    </div>
                </div>
            </aside>

            <!-- Center: Game Canvas -->
            <section id="game-canvas-container">
                <canvas id="game-canvas"></canvas>
                <div class="game-status" id="game-status"></div>
            </section>

            <!-- Right Panel: Settings & History -->
            <aside class="side-panel">
                <h2 class="panel-title">Settings</h2>
                <div class="settings-panel">
                    <div class="setting-group">
                        <label class="setting-label">Board Theme</label>
                        <div class="theme-preview">
                            <div class="theme-option theme-wooden active" onclick="changeTheme('wooden')"></div>
                            <div class="theme-option theme-marble" onclick="changeTheme('marble')"></div>
                            <div class="theme-option theme-neon" onclick="changeTheme('neon')"></div>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label">AI Difficulty</label>
                        <select id="ai-difficulty" onchange="changeAIDifficulty()">
                            <option value="1">Beginner</option>
                            <option value="2" selected>Intermediate</option>
                            <option value="3">Advanced</option>
                            <option value="4">Expert</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label">Camera Angle</label>
                        <input type="range" id="camera-angle" min="0" max="360" value="45" oninput="updateCamera()">
                    </div>
                    <div class="ai-indicator">
                        <div class="ai-thinking" id="ai-thinking">
                            <span>AI Thinking</span>
                            <div class="thinking-dot"></div>
                            <div class="thinking-dot"></div>
                            <div class="thinking-dot"></div>
                        </div>
                    </div>
                </div>

                <h2 class="panel-title" style="margin-top: 20px;">Move History</h2>
                <div class="move-history" id="move-history">
                    <div style="text-align: center; color: #999;">No moves yet</div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Chess Logic & Game Implementation -->
    <script>
        // ============================================
        // GLOBAL GAME STATE
        // ============================================
        let scene, camera, renderer, board, pieces = [];
        let selectedPiece = null;
        let gameState = initializeBoard();
        let currentPlayer = 'white';
        let moveHistory = [];
        let capturedPieces = { white: [], black: [] };
        let soundEnabled = true;
        let currentTheme = 'wooden';
        let aiDifficulty = 2;

        // Theme colors
        const themes = {
            wooden: {
                light: 0xF5E6D3,
                dark: 0x8B4513,
                ambient: 0xFFE4B5,
                piece: { white: 0xFFF8DC, black: 0x2C1810 }
            },
            marble: {
                light: 0xECF0F1,
                dark: 0x34495E,
                ambient: 0xBDC3C7,
                piece: { white: 0xFFFFFF, black: 0x2C3E50 }
            },
            neon: {
                light: 0x00E5FF,
                dark: 0x1A237E,
                ambient: 0x7C4DFF,
                piece: { white: 0x00E5FF, black: 0xFF1744 }
            }
        };

        // ============================================
        // INITIALIZE BOARD STATE
        // ============================================
        function initializeBoard() {
            const board = Array(8).fill(null).map(() => Array(8).fill(null));
            
            // Set up pieces
            const pieceOrder = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
            
            // Black pieces
            pieceOrder.forEach((piece, i) => {
                board[0][i] = { type: piece, color: 'black' };
            });
            for (let i = 0; i < 8; i++) {
                board[1][i] = { type: 'pawn', color: 'black' };
            }
            
            // White pieces
            for (let i = 0; i < 8; i++) {
                board[6][i] = { type: 'pawn', color: 'white' };
            }
            pieceOrder.forEach((piece, i) => {
                board[7][i] = { type: piece, color: 'white' };
            });
            
            return board;
        }

        // ============================================
        // THREE.JS SETUP
        // ============================================
        function initThreeJS() {
            const container = document.getElementById('game-canvas');
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);
            
            // Camera
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 12, 12);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: container, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(themes[currentTheme].ambient, 0.4);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.left = -10;
            directionalLight.shadow.camera.right = 10;
            directionalLight.shadow.camera.top = 10;
            directionalLight.shadow.camera.bottom = -10;
            scene.add(directionalLight);
            
            const pointLight = new THREE.PointLight(0xFFD700, 0.5, 50);
            pointLight.position.set(0, 8, 0);
            scene.add(pointLight);
            
            createBoard();
            createPieces();
            
            // Mouse interaction
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            container.addEventListener('click', (event) => {
                const rect = container.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);
                
                if (intersects.length > 0) {
                    handleClick(intersects[0].object);
                }
            });
            
            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
            
            animate();
        }

        // ============================================
        // CREATE CHESS BOARD
        // ============================================
        function createBoard() {
            const boardGroup = new THREE.Group();
            const theme = themes[currentTheme];
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const isLight = (row + col) % 2 === 0;
                    const geometry = new THREE.BoxGeometry(1, 0.2, 1);
                    const material = new THREE.MeshStandardMaterial({
                        color: isLight ? theme.light : theme.dark,
                        metalness: 0.3,
                        roughness: 0.7
                    });
                    
                    const square = new THREE.Mesh(geometry, material);
                    square.position.set(col - 3.5, -0.1, row - 3.5);
                    square.receiveShadow = true;
                    square.userData = { row, col, type: 'square' };
                    
                    boardGroup.add(square);
                }
            }
            
            // Board border
            const borderGeometry = new THREE.BoxGeometry(9, 0.5, 9);
            const borderMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                metalness: 0.8,
                roughness: 0.2
            });
            const border = new THREE.Mesh(borderGeometry, borderMaterial);
            border.position.y = -0.35;
            border.receiveShadow = true;
            boardGroup.add(border);
            
            scene.add(boardGroup);
            board = boardGroup;
        }

        // ============================================
        // CREATE CHESS PIECES
        // ============================================
        function createPieces() {
            const theme = themes[currentTheme];
            
            gameState.forEach((row, rowIndex) => {
                row.forEach((piece, colIndex) => {
                    if (piece) {
                        const pieceObj = createPiece(piece.type, piece.color);
                        pieceObj.position.set(colIndex - 3.5, 0.5, rowIndex - 3.5);
                        pieceObj.userData = {
                            type: piece.type,
                            color: piece.color,
                            row: rowIndex,
                            col: colIndex,
                            isPiece: true
                        };
                        scene.add(pieceObj);
                        pieces.push(pieceObj);
                    }
                });
            });
        }

        function createPiece(type, color) {
            const theme = themes[currentTheme];
            const pieceColor = color === 'white' ? theme.piece.white : theme.piece.black;
            
            let geometry;
            switch (type) {
                case 'pawn':
                    geometry = new THREE.CylinderGeometry(0.2, 0.3, 0.8, 16);
                    break;
                case 'rook':
                    geometry = new THREE.BoxGeometry(0.5, 0.8, 0.5);
                    break;
                case 'knight':
                    geometry = new THREE.ConeGeometry(0.3, 0.8, 16);
                    break;
                case 'bishop':
                    geometry = new THREE.CylinderGeometry(0.15, 0.3, 0.9, 16);
                    break;
                case 'queen':
                    geometry = new THREE.SphereGeometry(0.35, 16, 16);
                    break;
                case 'king':
                    geometry = new THREE.CylinderGeometry(0.3, 0.35, 0.9, 8);
                    break;
                default:
                    geometry = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 16);
            }
            
            const material = new THREE.MeshStandardMaterial({
                color: pieceColor,
                metalness: 0.6,
                roughness: 0.4,
                emissive: pieceColor,
                emissiveIntensity: 0.1
            });
            
            const piece = new THREE.Mesh(geometry, material);
            piece.castShadow = true;
            piece.receiveShadow = true;
            
            return piece;
        }

        // ============================================
        // CLICK HANDLING
        // ============================================
        function handleClick(object) {
            if (currentPlayer !== 'white') return; // Only allow moves when it's player's turn
            
            if (object.userData.isPiece) {
                if (selectedPiece) {
                    // Try to capture
                    if (object.userData.color !== selectedPiece.userData.color) {
                        movePiece(selectedPiece, object.userData.row, object.userData.col, object);
                    } else {
                        // Select different piece
                        deselectPiece();
                        selectPiece(object);
                    }
                } else if (object.userData.color === currentPlayer) {
                    selectPiece(object);
                }
            } else if (object.userData.type === 'square' && selectedPiece) {
                movePiece(selectedPiece, object.userData.row, object.userData.col);
            }
        }

        function selectPiece(piece) {
            selectedPiece = piece;
            piece.position.y += 0.5;
            piece.material.emissiveIntensity = 0.3;
            playSound('select');
        }

        function deselectPiece() {
            if (selectedPiece) {
                selectedPiece.position.y -= 0.5;
                selectedPiece.material.emissiveIntensity = 0.1;
                selectedPiece = null;
            }
        }

        // ============================================
        // MOVE LOGIC
        // ============================================
        function movePiece(piece, toRow, toCol, capturedPiece = null) {
            const fromRow = piece.userData.row;
            const fromCol = piece.userData.col;
            
            if (!isValidMove(piece, fromRow, fromCol, toRow, toCol)) {
                deselectPiece();
                playSound('invalid');
                return;
            }
            
            // Animate movement
            animatePieceMove(piece, toRow, toCol);
            
            // Update board state
            gameState[fromRow][fromCol] = null;
            gameState[toRow][toCol] = {
                type: piece.userData.type,
                color: piece.userData.color
            };
            
            piece.userData.row = toRow;
            piece.userData.col = toCol;
            
            // Handle capture
            if (capturedPiece) {
                scene.remove(capturedPiece);
                pieces = pieces.filter(p => p !== capturedPiece);
                capturedPieces[currentPlayer].push(capturedPiece.userData.type);
                updateCapturedDisplay();
                playSound('capture');
                createParticles(toCol - 3.5, 0.5, toRow - 3.5);
            } else {
                playSound('move');
            }
            
            // Add to history
            const moveNotation = `${piece.userData.type[0].toUpperCase()}${String.fromCharCode(97 + fromCol)}${8 - fromRow}-${String.fromCharCode(97 + toCol)}${8 - toRow}`;
            moveHistory.push(moveNotation);
            updateMoveHistory();
            
            deselectPiece();
            
            // Check for check/checkmate
            if (isKingInCheck(currentPlayer === 'white' ? 'black' : 'white')) {
                showStatus('Check!');
                playSound('check');
            }
            
            // Switch turns
            currentPlayer = currentPlayer === 'white' ? 'black' : 'white';
            
            // AI move
            if (currentPlayer === 'black') {
                setTimeout(makeAIMove, 1000);
            }
        }

        function animatePieceMove(piece, toRow, toCol) {
            const targetX = toCol - 3.5;
            const targetZ = toRow - 3.5;
            const startX = piece.position.x;
            const startZ = piece.position.z;
            const duration = 500;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeInOutCubic(progress);
                
                piece.position.x = startX + (targetX - startX) * eased;
                piece.position.z = startZ + (targetZ - startZ) * eased;
                piece.position.y = 0.5 + Math.sin(progress * Math.PI) * 0.5;
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    piece.position.y = 0.5;
                }
            }
            
            animate();
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // ============================================
        // VALIDATION
        // ============================================
        function isValidMove(piece, fromRow, fromCol, toRow, toCol) {
            // Basic validation
            if (toRow < 0 || toRow > 7 || toCol < 0 || toCol > 7) return false;
            if (fromRow === toRow && fromCol === toCol) return false;
            
            const targetPiece = gameState[toRow][toCol];
            if (targetPiece && targetPiece.color === piece.userData.color) return false;
            
            // Piece-specific movement (simplified)
            const rowDiff = Math.abs(toRow - fromRow);
            const colDiff = Math.abs(toCol - fromCol);
            
            switch (piece.userData.type) {
                case 'pawn':
                    const direction = piece.userData.color === 'white' ? -1 : 1;
                    const startRow = piece.userData.color === 'white' ? 6 : 1;
                    
                    if (colDiff === 0 && !targetPiece) {
                        if (toRow === fromRow + direction) return true;
                        if (fromRow === startRow && toRow === fromRow + 2 * direction) return true;
                    }
                    if (colDiff === 1 && toRow === fromRow + direction && targetPiece) return true;
                    return false;
                    
                case 'rook':
                    return (rowDiff === 0 || colDiff === 0) && isPathClear(fromRow, fromCol, toRow, toCol);
                    
                case 'knight':
                    return (rowDiff === 2 && colDiff === 1) || (rowDiff === 1 && colDiff === 2);
                    
                case 'bishop':
                    return rowDiff === colDiff && isPathClear(fromRow, fromCol, toRow, toCol);
                    
                case 'queen':
                    return (rowDiff === colDiff || rowDiff === 0 || colDiff === 0) && isPathClear(fromRow, fromCol, toRow, toCol);
                    
                case 'king':
                    return rowDiff <= 1 && colDiff <= 1;
                    
                default:
                    return false;
            }
        }

        function isPathClear(fromRow, fromCol, toRow, toCol) {
            const rowStep = Math.sign(toRow - fromRow);
            const colStep = Math.sign(toCol - fromCol);
            let currentRow = fromRow + rowStep;
            let currentCol = fromCol + colStep;
            
            while (currentRow !== toRow || currentCol !== toCol) {
                if (gameState[currentRow][currentCol]) return false;
                currentRow += rowStep;
                currentCol += colStep;
            }
            
            return true;
        }

        // ============================================
        // AI OPPONENT
        // ============================================
        function makeAIMove() {
            document.getElementById('ai-thinking').classList.add('active');
            
            setTimeout(() => {
                const blackPieces = pieces.filter(p => p.userData.color === 'black');
                const validMoves = [];
                
                // Find all valid moves
                blackPieces.forEach(piece => {
                    for (let row = 0; row < 8; row++) {
                        for (let col = 0; col < 8; col++) {
                            if (isValidMove(piece, piece.userData.row, piece.userData.col, row, col)) {
                                const targetPiece = pieces.find(p => p.userData.row === row && p.userData.col === col);
                                const score = targetPiece ? 10 : 1;
                                validMoves.push({ piece, row, col, targetPiece, score });
                            }
                        }
                    }
                });
                
                if (validMoves.length > 0) {
                    // Sort by score (prefer captures) and add some randomness
                    validMoves.sort((a, b) => b.score - a.score);
                    const topMoves = validMoves.slice(0, Math.min(5, validMoves.length));
                    const move = topMoves[Math.floor(Math.random() * topMoves.length)];
                    
                    movePiece(move.piece, move.row, move.col, move.targetPiece);
                }
                
                document.getElementById('ai-thinking').classList.remove('active');
            }, 1000 + Math.random() * 1000);
        }

        // ============================================
        // PARTICLE EFFECTS
        // ============================================
        function createParticles(x, y, z) {
            const particleCount = 20;
            const particles = new THREE.Group();
            
            for (let i = 0; i < particleCount; i++) {
                const geometry = new THREE.SphereGeometry(0.05, 4, 4);
                const material = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
                const particle = new THREE.Mesh(geometry, material);
                
                particle.position.set(x, y, z);
                particle.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    Math.random() * 0.3,
                    (Math.random() - 0.5) * 0.2
                );
                
                particles.add(particle);
            }
            
            scene.add(particles);
            
            const startTime = Date.now();
            function animateParticles() {
                const elapsed = Date.now() - startTime;
                if (elapsed > 1000) {
                    scene.remove(particles);
                    return;
                }
                
                particles.children.forEach(particle => {
                    particle.position.add(particle.velocity);
                    particle.velocity.y -= 0.01;
                    particle.material.opacity = 1 - (elapsed / 1000);
                });
                
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }

        // ============================================
        // UI UPDATES
        // ============================================
        function updateMoveHistory() {
            const historyDiv = document.getElementById('move-history');
            historyDiv.innerHTML = moveHistory.map((move, i) => 
                `<div class="move-entry">${i + 1}. ${move}</div>`
            ).join('');
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        function updateCapturedDisplay() {
            const whiteCaptured = document.getElementById('white-captured');
            const blackCaptured = document.getElementById('black-captured');
            
            const pieceSymbols = {
                pawn: '♙', knight: '♘', bishop: '♗', rook: '♖', queen: '♕', king: '♔'
            };
            
            whiteCaptured.innerHTML = capturedPieces.white.map(type => 
                `<span class="captured-piece">${pieceSymbols[type]}</span>`
            ).join('');
            
            blackCaptured.innerHTML = capturedPieces.black.map(type => 
                `<span class="captured-piece">${pieceSymbols[type]}</span>`
            ).join('');
        }

        function showStatus(message) {
            const status = document.getElementById('game-status');
            status.textContent = message;
            status.classList.add('show');
            setTimeout(() => status.classList.remove('show'), 3000);
        }

        // ============================================
        // SOUND EFFECTS
        // ============================================
        function playSound(type) {
            if (!soundEnabled) return;
            
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            switch (type) {
                case 'move':
                    oscillator.frequency.value = 400;
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                case 'capture':
                    oscillator.frequency.value = 200;
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
                case 'check':
                    oscillator.frequency.value = 600;
                    gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
                case 'select':
                    oscillator.frequency.value = 800;
                    gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.05);
                    break;
                case 'invalid':
                    oscillator.frequency.value = 150;
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.15);
                    break;
            }
        }

        // ============================================
        // CONTROLS
        // ============================================
        function newGame() {
            // Clear pieces
            pieces.forEach(piece => scene.remove(piece));
            pieces = [];
            
            // Reset state
            gameState = initializeBoard();
            currentPlayer = 'white';
            moveHistory = [];
            capturedPieces = { white: [], black: [] };
            selectedPiece = null;
            
            // Recreate pieces
            createPieces();
            
            // Update UI
            document.getElementById('move-history').innerHTML = '<div style="text-align: center; color: #999;">No moves yet</div>';
            updateCapturedDisplay();
            
            playSound('move');
        }

        function undoMove() {
            if (moveHistory.length === 0) return;
            
            // Simplified undo - just restart for now
            newGame();
            playSound('move');
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = event.target;
            btn.textContent = soundEnabled ? '🔊 Sound' : '🔇 Muted';
        }

        function changeTheme(theme) {
            currentTheme = theme;
            
            // Update active theme
            document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            
            // Rebuild board and pieces
            scene.remove(board);
            pieces.forEach(piece => scene.remove(piece));
            pieces = [];
            
            createBoard();
            
            gameState.forEach((row, rowIndex) => {
                row.forEach((piece, colIndex) => {
                    if (piece) {
                        const pieceObj = createPiece(piece.type, piece.color);
                        pieceObj.position.set(colIndex - 3.5, 0.5, rowIndex - 3.5);
                        pieceObj.userData = {
                            type: piece.type,
                            color: piece.color,
                            row: rowIndex,
                            col: colIndex,
                            isPiece: true
                        };
                        scene.add(pieceObj);
                        pieces.push(pieceObj);
                    }
                });
            });
            
            playSound('move');
        }

        function changeAIDifficulty() {
            aiDifficulty = parseInt(document.getElementById('ai-difficulty').value);
        }

        function updateCamera() {
            const angle = parseInt(document.getElementById('camera-angle').value) * Math.PI / 180;
            camera.position.x = 12 * Math.sin(angle);
            camera.position.z = 12 * Math.cos(angle);
            camera.lookAt(0, 0, 0);
        }

        // ============================================
        // PARTICLE BACKGROUND
        // ============================================
        function initParticleBackground() {
            const canvas = document.getElementById('particles-bg');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 2
                });
            }
            
            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
                
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ============================================
        // ANIMATION LOOP
        // ============================================
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // ============================================
        // INITIALIZATION

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                initParticleBackground();
                initThreeJS();
            }, 1500);
        });
